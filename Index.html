<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Motors Hub</title>
    <link rel="stylesheet" href="Styles.css">
</head>

<body>
    <div id="Page-Home">
        <header>
            <div>
                <h1><em>Wolf Motors Hub</em></h1>
            </div>
        </header>

        <main>
            <div class="Div-Text">
                <h2 class="Title">EL PODER DE ELEGIR TU BESTIA </h2>
                <p class="Subtitle">Acelera o te quedas atras
                    <br>
                    <span class="Subtitle2">Americanos • Japoneses • Europeos</span>
                </p>
            </div>
            <section class="container-cards">
                <div class="card usa fade-USA" id="usa" onclick="AbrirUSA()">
                    <img class="img-card" src="./Assent/Home/USA-Card.jpg" alt="">
                    <h3>Americanos</h3>
                    <p>Potencia bruta. V8 puro. Dominio total.</p>
                </div>
                <div class="card jdm fade-JDM " id="jdm" onclick="AbrirJDM()">
                    <img class="img-card" src="./Assent/Home/JDM-Card.jpg" alt="">
                    <h3>Japoneses</h3>
                    <p>Precisión letal. Tecnología futurista. Velocidad quirúrgica.</p>
                </div>
                <div class="card eu fade-EURO" id="eu" onclick="AbrirEU()">
                    <img class="img-card" src="./Assent/Home/EU-Card.jpg" alt="">
                    <h3>Europeos</h3>
                    <p>Lujo extremo. Ingeniería superior. Control absoluto.</p>
                </div>
            </section>
        </main>
    </div>
    <section id="Page-USA">
    </section>
    <section id="Page-JDM">
    </section>
    <section id="Page-EU">
    </section>
</body>
<script type="module" src="./JS/Main.js"></script>

</html>
